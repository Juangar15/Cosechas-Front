server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # Esta línea es CLAVE para React Router. 
        # Si un usuario recarga la página en /estadisticas, redirige internamente a index.html
        try_files $uri $uri/ /index.html;
    }

    # Caché para los archivos estáticos
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
